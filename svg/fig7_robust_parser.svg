<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Noto Sans CJK SC, Arial, Helvetica, sans-serif">
  <defs>
    <marker id="ar7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C0392B"/>
    </marker>
    <marker id="ar7g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3D8B40"/>
    </marker>
  </defs>

  <text x="500" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">六级鲁棒输出解析级联架构</text>
  <text x="500" y="48" font-size="11" text-anchor="middle" fill="#555">Six-Level Cascading Robust Output Parser (Defense in Depth)</text>

  <!-- Input -->
  <rect x="350" y="80" width="300" height="44" rx="6" fill="#E8F1FA" stroke="#2E5C8A" stroke-width="1.4"/>
  <text x="500" y="100" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f3a5f">VLM raw_output (text)</text>
  <text x="500" y="116" font-size="9" text-anchor="middle" fill="#555">含格式偏差、中英符号混用、嵌套结构等</text>

  <line x1="500" y1="124" x2="500" y2="148" stroke="#2E5C8A" stroke-width="1.5" marker-end="url(#ar7)"/>

  <!-- L1 -->
  <rect x="100" y="148" width="800" height="68" rx="6" fill="#E8F1FA" stroke="#2E5C8A" stroke-width="1.4"/>
  <rect x="100" y="148" width="120" height="68" rx="6" fill="#2E5C8A"/>
  <text x="160" y="180" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFF">L1</text>
  <text x="160" y="200" font-size="9" text-anchor="middle" fill="#FFF">高置信</text>
  <text x="240" y="170" font-size="11" font-weight="bold" fill="#1f3a5f">动作行锚定 + 精确解析 (Action-Line Anchored Parsing)</text>
  <text x="240" y="186" font-size="10" fill="#444">提取以「动作：」开头的行 → 按关键词 (CLICK/TYPE/SCROLL/OPEN/COMPLETE) 分发</text>
  <text x="240" y="200" font-size="10" fill="#444">每动作 × 3 种正则格式: 标准格式 / 宽松空格 / 原始 click(point=...) 格式</text>

  <line x1="500" y1="216" x2="500" y2="232" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#ar7)"/>
  <text x="535" y="227" font-size="9" fill="#C0392B" font-style="italic">L1 失败时↓</text>

  <!-- L2 -->
  <rect x="100" y="232" width="800" height="56" rx="6" fill="#EDF7EE" stroke="#3D8B40" stroke-width="1.4"/>
  <rect x="100" y="232" width="120" height="56" rx="6" fill="#3D8B40"/>
  <text x="160" y="260" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFF">L2</text>
  <text x="160" y="278" font-size="9" text-anchor="middle" fill="#FFF">补救</text>
  <text x="240" y="252" font-size="11" font-weight="bold" fill="#1F5223">全文 COMPLETE 标记扫描</text>
  <text x="240" y="268" font-size="10" fill="#444">re.search(r"COMPLETE\s*:\s*\[\s*\]", raw, IGNORECASE) → 防止 COMPLETE 被埋在文本中漏检</text>
  <text x="240" y="282" font-size="10" fill="#444">命中即返回 ('COMPLETE', {})</text>

  <line x1="500" y1="288" x2="500" y2="304" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#ar7)"/>

  <!-- L3 -->
  <rect x="100" y="304" width="800" height="56" rx="6" fill="#FFF7E6" stroke="#D49A2E" stroke-width="1.4"/>
  <rect x="100" y="304" width="120" height="56" rx="6" fill="#D49A2E"/>
  <text x="160" y="332" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFF">L3</text>
  <text x="160" y="350" font-size="9" text-anchor="middle" fill="#FFF">宽松</text>
  <text x="240" y="324" font-size="11" font-weight="bold" fill="#7A5300">全文宽松解析 (Loose Full-Text Scan)</text>
  <text x="240" y="340" font-size="10" fill="#444">不限定动作行位置，扫描全文，依次尝试 CLICK/TYPE/SCROLL/OPEN 宽松正则</text>
  <text x="240" y="354" font-size="10" fill="#444">允许中英文标点混用，允许大小写不一致，允许有/无引号</text>

  <line x1="500" y1="360" x2="500" y2="376" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#ar7)"/>

  <!-- L4 -->
  <rect x="100" y="376" width="800" height="56" rx="6" fill="#FFF3DE" stroke="#D49A2E" stroke-width="1.4"/>
  <rect x="100" y="376" width="120" height="56" rx="6" fill="#E07A1F"/>
  <text x="160" y="404" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFF">L4</text>
  <text x="160" y="422" font-size="9" text-anchor="middle" fill="#FFF">提取</text>
  <text x="240" y="396" font-size="11" font-weight="bold" fill="#7A5300">Desperate CLICK (坐标对盲提)</text>
  <text x="240" y="412" font-size="10" fill="#444">从全文提取任意形如 [xx, yy] / (xx, yy) / "坐标 xx yyy" 的数对</text>
  <text x="240" y="426" font-size="10" fill="#444">取首个合法坐标对作为 CLICK，避免完全失败</text>

  <line x1="500" y1="432" x2="500" y2="448" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#ar7)"/>

  <!-- L5 -->
  <rect x="100" y="448" width="800" height="56" rx="6" fill="#F3EBF8" stroke="#6F42C1" stroke-width="1.4"/>
  <rect x="100" y="448" width="120" height="56" rx="6" fill="#6F42C1"/>
  <text x="160" y="476" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFF">L5</text>
  <text x="160" y="494" font-size="9" text-anchor="middle" fill="#FFF">语义</text>
  <text x="240" y="468" font-size="11" font-weight="bold" fill="#3F2466">中文语义 COMPLETE</text>
  <text x="240" y="484" font-size="10" fill="#444">关键词集合: "任务已完成" / "所有步骤完成" / "操作完毕" / "已成功"</text>
  <text x="240" y="498" font-size="10" fill="#444">命中任一关键词 → 低置信度返回 COMPLETE</text>

  <line x1="500" y1="504" x2="500" y2="520" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#ar7)"/>

  <!-- L6 -->
  <rect x="100" y="520" width="800" height="56" rx="6" fill="#FBE9E7" stroke="#C0392B" stroke-width="1.4"/>
  <rect x="100" y="520" width="120" height="56" rx="6" fill="#C0392B"/>
  <text x="160" y="548" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFF">L6</text>
  <text x="160" y="566" font-size="9" text-anchor="middle" fill="#FFF">兜底</text>
  <text x="240" y="540" font-size="11" font-weight="bold" fill="#7A1F1F">安全兜底 (Safe Fallback)</text>
  <text x="240" y="556" font-size="10" fill="#444">返回 SCROLL:[[500,700],[500,300]] (向下滚动) — 探索更多内容，不消耗坐标精度</text>
  <text x="240" y="570" font-size="10" fill="#444">保证任何情况下都有合法输出，避免评测中断</text>

  <!-- Output -->
  <line x1="500" y1="576" x2="500" y2="600" stroke="#3D8B40" stroke-width="1.6" marker-end="url(#ar7g)"/>
  <rect x="320" y="600" width="360" height="44" rx="6" fill="#D6F0DC" stroke="#3D8B40" stroke-width="1.6"/>
  <text x="500" y="620" font-size="11" font-weight="bold" text-anchor="middle" fill="#1F5223">(action, parameters) 合法元组</text>
  <text x="500" y="636" font-size="9" text-anchor="middle" fill="#1F5223">L1-L6 任一级别命中即返回，确保 100% 可解析率</text>

  <!-- Right side: success rate -->
  <rect x="780" y="660" width="180" height="48" rx="4" fill="#F8F9FA" stroke="#888"/>
  <text x="870" y="678" font-size="10" font-weight="bold" text-anchor="middle" fill="#444">实测命中分布</text>
  <text x="870" y="692" font-size="9" text-anchor="middle" fill="#666">L1: ~85%, L2-L3: ~10%</text>
  <text x="870" y="704" font-size="9" text-anchor="middle" fill="#666">L4-L6: ~5% (兜底)</text>

  <text x="500" y="700" font-size="10" text-anchor="middle" fill="#666" font-style="italic">图 7 · 纵深防御 (Defense-in-Depth) 解析架构，将单一正则失败率从 ≈18% 降至 0%</text>
</svg>
