<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="Noto Sans CJK SC, Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E5C8A"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3D8B40"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B33A3A"/>
    </marker>
  </defs>

  <text x="500" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">层级任务规划流程 (Plan-and-Execute)</text>
  <text x="500" y="48" font-size="11" text-anchor="middle" fill="#555">Hierarchical Task Decomposition with Global Plan as Persistent Anchor</text>

  <!-- Comparison: Reactive vs Plan-and-Execute -->
  <!-- LEFT: Reactive baseline -->
  <rect x="40" y="80" width="430" height="200" rx="6" fill="#FCEDED" stroke="#B33A3A" stroke-width="1.4"/>
  <text x="255" y="104" font-size="13" font-weight="bold" text-anchor="middle" fill="#7A1F1F">⚠ 基线: Reactive Agent</text>
  <text x="255" y="122" font-size="10" text-anchor="middle" fill="#7A1F1F" font-style="italic">"看一步走一步"，无全局视野</text>

  <g>
    <circle cx="80" cy="170" r="22" fill="#FFF" stroke="#B33A3A"/>
    <text x="80" y="174" font-size="11" text-anchor="middle" fill="#7A1F1F">𝑆₁</text>
    <text x="80" y="208" font-size="9" text-anchor="middle" fill="#7A1F1F">step 1</text>
  </g>
  <g>
    <circle cx="170" cy="170" r="22" fill="#FFF" stroke="#B33A3A"/>
    <text x="170" y="174" font-size="11" text-anchor="middle" fill="#7A1F1F">𝑆₂</text>
    <text x="170" y="208" font-size="9" text-anchor="middle" fill="#7A1F1F">step 2</text>
  </g>
  <g>
    <circle cx="260" cy="170" r="22" fill="#FFF" stroke="#B33A3A"/>
    <text x="260" y="174" font-size="11" text-anchor="middle" fill="#7A1F1F">𝑆ₜ</text>
    <text x="260" y="208" font-size="9" text-anchor="middle" fill="#7A1F1F">step t</text>
  </g>
  <g>
    <circle cx="350" cy="170" r="22" fill="#FFE0E0" stroke="#B33A3A" stroke-dasharray="3,2"/>
    <text x="350" y="174" font-size="11" text-anchor="middle" fill="#7A1F1F">?</text>
    <text x="350" y="208" font-size="9" text-anchor="middle" fill="#7A1F1F">迷失</text>
  </g>
  <line x1="102" y1="170" x2="148" y2="170" stroke="#B33A3A" stroke-width="1.4" marker-end="url(#arrR)"/>
  <line x1="192" y1="170" x2="238" y2="170" stroke="#B33A3A" stroke-width="1.4" marker-end="url(#arrR)"/>
  <line x1="282" y1="170" x2="328" y2="170" stroke="#B33A3A" stroke-width="1.4" marker-end="url(#arrR)" stroke-dasharray="3,2"/>

  <text x="255" y="245" font-size="10" text-anchor="middle" fill="#7A1F1F">aₜ = π(𝑆ₜ)  · 仅依赖当前观测</text>
  <text x="255" y="262" font-size="10" text-anchor="middle" fill="#7A1F1F" font-weight="bold">长任务（≥10步）目标遗忘率显著上升</text>

  <!-- RIGHT: Plan-and-Execute -->
  <rect x="530" y="80" width="430" height="200" rx="6" fill="#EAF4EE" stroke="#3D8B40" stroke-width="1.4"/>
  <text x="745" y="104" font-size="13" font-weight="bold" text-anchor="middle" fill="#1F5223">✓ 本方案: Plan-and-Execute</text>
  <text x="745" y="122" font-size="10" text-anchor="middle" fill="#1F5223" font-style="italic">先规划全局蓝图，再分步执行</text>

  <!-- Global plan box at top -->
  <rect x="600" y="138" width="290" height="32" rx="4" fill="#3D8B40"/>
  <text x="745" y="158" font-size="11" font-weight="bold" text-anchor="middle" fill="#FFF">全局计划 𝑃 (持久化锚点)</text>

  <g>
    <circle cx="580" cy="210" r="22" fill="#FFF" stroke="#3D8B40"/>
    <text x="580" y="214" font-size="11" text-anchor="middle" fill="#1F5223">𝑆₁</text>
  </g>
  <g>
    <circle cx="660" cy="210" r="22" fill="#FFF" stroke="#3D8B40"/>
    <text x="660" y="214" font-size="11" text-anchor="middle" fill="#1F5223">𝑆₂</text>
  </g>
  <g>
    <circle cx="740" cy="210" r="22" fill="#FFF" stroke="#3D8B40"/>
    <text x="740" y="214" font-size="11" text-anchor="middle" fill="#1F5223">𝑆ₜ</text>
  </g>
  <g>
    <circle cx="820" cy="210" r="22" fill="#FFF" stroke="#3D8B40"/>
    <text x="820" y="214" font-size="11" text-anchor="middle" fill="#1F5223">…</text>
  </g>
  <g>
    <circle cx="900" cy="210" r="22" fill="#3D8B40" stroke="#1F5223"/>
    <text x="900" y="215" font-size="10" text-anchor="middle" fill="#FFF" font-weight="bold">✓</text>
  </g>
  <line x1="602" y1="210" x2="638" y2="210" stroke="#3D8B40" stroke-width="1.4" marker-end="url(#arrG)"/>
  <line x1="682" y1="210" x2="718" y2="210" stroke="#3D8B40" stroke-width="1.4" marker-end="url(#arrG)"/>
  <line x1="762" y1="210" x2="798" y2="210" stroke="#3D8B40" stroke-width="1.4" marker-end="url(#arrG)"/>
  <line x1="842" y1="210" x2="878" y2="210" stroke="#3D8B40" stroke-width="1.4" marker-end="url(#arrG)"/>

  <!-- Dashed lines from plan to each step -->
  <line x1="600" y1="170" x2="580" y2="188" stroke="#3D8B40" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="680" y1="170" x2="660" y2="188" stroke="#3D8B40" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="760" y1="170" x2="740" y2="188" stroke="#3D8B40" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="840" y1="170" x2="820" y2="188" stroke="#3D8B40" stroke-width="0.8" stroke-dasharray="2,2"/>

  <text x="745" y="252" font-size="10" text-anchor="middle" fill="#1F5223">aₜ = π(𝑆ₜ, 𝑃, 𝐻ₜ₋₁)  · 全程对齐目标</text>

  <!-- Bottom: Detailed flow -->
  <text x="500" y="318" font-size="13" font-weight="bold" text-anchor="middle" fill="#1f3a5f">▼ 本方案算法流程</text>

  <!-- Flow boxes -->
  <rect x="40" y="340" width="170" height="60" rx="6" fill="#E8F1FA" stroke="#2E5C8A" stroke-width="1.4"/>
  <text x="125" y="362" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f3a5f">1. 接收指令 𝐼</text>
  <text x="125" y="380" font-size="9" text-anchor="middle" fill="#555">用户自然语言任务描述</text>
  <text x="125" y="392" font-size="9" text-anchor="middle" fill="#555">+ 首屏截图 𝑆₁</text>

  <rect x="240" y="340" width="170" height="60" rx="6" fill="#E8F1FA" stroke="#2E5C8A" stroke-width="1.4"/>
  <text x="325" y="362" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f3a5f">2. App 识别</text>
  <text x="325" y="380" font-size="9" text-anchor="middle" fill="#555">关键词词典匹配</text>
  <text x="325" y="392" font-size="9" text-anchor="middle" fill="#555">+ 别名规范化</text>

  <rect x="440" y="340" width="170" height="60" rx="6" fill="#E8F1FA" stroke="#2E5C8A" stroke-width="1.4"/>
  <text x="525" y="362" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f3a5f">3. 规划调用</text>
  <text x="525" y="380" font-size="9" text-anchor="middle" fill="#555">𝑃 = VLM_planner(𝐼, 𝑆₁)</text>
  <text x="525" y="392" font-size="9" text-anchor="middle" fill="#555">~2000 token</text>

  <rect x="640" y="340" width="170" height="60" rx="6" fill="#E8F1FA" stroke="#2E5C8A" stroke-width="1.4"/>
  <text x="725" y="362" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f3a5f">4. 计划缓存</text>
  <text x="725" y="380" font-size="9" text-anchor="middle" fill="#555">self.plan ← 𝑃</text>
  <text x="725" y="392" font-size="9" text-anchor="middle" fill="#555">仅生成一次</text>

  <rect x="840" y="340" width="140" height="60" rx="6" fill="#E8F1FA" stroke="#2E5C8A" stroke-width="1.4"/>
  <text x="910" y="362" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f3a5f">5. 注入 Prompt</text>
  <text x="910" y="380" font-size="9" text-anchor="middle" fill="#555">每步携带 𝑃</text>
  <text x="910" y="392" font-size="9" text-anchor="middle" fill="#555">作为导航锚</text>

  <line x1="210" y1="370" x2="240" y2="370" stroke="#2E5C8A" stroke-width="1.5" marker-end="url(#arrA)"/>
  <line x1="410" y1="370" x2="440" y2="370" stroke="#2E5C8A" stroke-width="1.5" marker-end="url(#arrA)"/>
  <line x1="610" y1="370" x2="640" y2="370" stroke="#2E5C8A" stroke-width="1.5" marker-end="url(#arrA)"/>
  <line x1="810" y1="370" x2="840" y2="370" stroke="#2E5C8A" stroke-width="1.5" marker-end="url(#arrA)"/>

  <!-- Plan example block -->
  <rect x="100" y="425" width="800" height="115" rx="6" fill="#F8FAFC" stroke="#2E5C8A" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="120" y="445" font-size="11" font-weight="bold" fill="#1f3a5f">𝑃 示例 — 用户指令: "帮我在美团订一份黄焖鸡外卖"</text>
  <text x="120" y="464" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#333">步骤1: 打开美团 App     ▸ OPEN['美团']</text>
  <text x="120" y="478" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#333">步骤2: 点击外卖功能入口  ▸ CLICK[[100,195]]</text>
  <text x="120" y="492" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#333">步骤3: 在搜索框输入"黄焖鸡"      ▸ CLICK→TYPE</text>
  <text x="120" y="506" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#333">步骤4: 选择第一个搜索结果商家   ▸ CLICK[[500,192]]</text>
  <text x="120" y="520" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#333">…   完成: 订单提交成功页面 ▸ COMPLETE[]</text>
  <text x="120" y="534" font-size="9" fill="#666" font-style="italic">规划阶段额外消耗 ≈ 2000 token，但减少错误步骤可净节省 1000–6000 token</text>

  <text x="500" y="562" font-size="10" text-anchor="middle" fill="#666" font-style="italic">图 3 · Plan-and-Execute 范式：以全局计划 𝑃 作为持久化导航锚，对抗长程目标遗忘</text>
</svg>
