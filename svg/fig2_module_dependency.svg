<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="Noto Sans CJK SC, Arial, Helvetica, sans-serif">
  <defs>
    <marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E5C8A"/>
    </marker>
    <marker id="arGrey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>

  <text x="500" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">模块依赖关系图</text>
  <text x="500" y="48" font-size="11" text-anchor="middle" fill="#555">Module Dependency Graph of HierarchicalGUIAgent</text>

  <!-- Central Agent node -->
  <!-- agent_base on top -->
  <rect x="400" y="80" width="200" height="50" rx="6" fill="#F4F6F8" stroke="#888" stroke-width="1.4" stroke-dasharray="4,3"/>
  <text x="500" y="104" font-size="12" font-weight="bold" text-anchor="middle" fill="#444">agent_base.py</text>
  <text x="500" y="120" font-size="10" text-anchor="middle" fill="#666">BaseAgent (主办方提供，禁止修改)</text>
  <line x1="500" y1="130" x2="500" y2="168" stroke="#666" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arGrey)"/>
  <text x="540" y="152" font-size="9" fill="#666" font-style="italic">inherits</text>

  <!-- Central Agent node -->
  <rect x="380" y="170" width="240" height="76" rx="8" fill="#2E5C8A" stroke="#1f3a5f" stroke-width="2"/>
  <text x="500" y="200" font-size="15" font-weight="bold" text-anchor="middle" fill="#FFF">agent.py</text>
  <text x="500" y="220" font-size="12" text-anchor="middle" fill="#FFF">HierarchicalGUIAgent</text>
  <text x="500" y="236" font-size="10" text-anchor="middle" fill="#D9E5F2">(继承自 BaseAgent)</text>

  <!-- 5 utility modules below -->
  <g>
    <rect x="40" y="360" width="170" height="80" rx="6" fill="#E8F1FA" stroke="#2E5C8A" stroke-width="1.4"/>
    <text x="125" y="384" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f3a5f">utils/task_planner.py</text>
    <line x1="60" y1="394" x2="210" y2="394" stroke="#B6CCE2" stroke-width="0.8"/>
    <text x="125" y="410" font-size="9" text-anchor="middle" fill="#444">TaskPlanner</text>
    <text x="125" y="424" font-size="9" text-anchor="middle" fill="#444">App 识别 + 计划生成</text>
  </g>

  <g>
    <rect x="230" y="360" width="170" height="80" rx="6" fill="#EDF7EE" stroke="#3D8B40" stroke-width="1.4"/>
    <text x="315" y="384" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f3a5f">utils/context_manager.py</text>
    <line x1="250" y1="394" x2="400" y2="394" stroke="#BFE3C2" stroke-width="0.8"/>
    <text x="315" y="410" font-size="9" text-anchor="middle" fill="#444">ContextManager</text>
    <text x="315" y="424" font-size="9" text-anchor="middle" fill="#444">滑动窗口 + 历史摘要</text>
  </g>

  <g>
    <rect x="420" y="360" width="170" height="80" rx="6" fill="#F3EBF8" stroke="#6F42C1" stroke-width="1.4"/>
    <text x="505" y="384" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f3a5f">utils/prompt_engine.py</text>
    <line x1="440" y1="394" x2="590" y2="394" stroke="#D9C7EA" stroke-width="0.8"/>
    <text x="505" y="410" font-size="9" text-anchor="middle" fill="#444">PromptEngine + FewShotDB</text>
    <text x="505" y="424" font-size="9" text-anchor="middle" fill="#444">+ AppDetector</text>
  </g>

  <g>
    <rect x="610" y="360" width="170" height="80" rx="6" fill="#FFF3DE" stroke="#D49A2E" stroke-width="1.4"/>
    <text x="695" y="384" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f3a5f">utils/img_processor.py</text>
    <line x1="630" y1="394" x2="780" y2="394" stroke="#EFD9A8" stroke-width="0.8"/>
    <text x="695" y="410" font-size="9" text-anchor="middle" fill="#444">ImagePreprocessor</text>
    <text x="695" y="424" font-size="9" text-anchor="middle" fill="#444">LANCZOS + Base64</text>
  </g>

  <g>
    <rect x="800" y="360" width="170" height="80" rx="6" fill="#FBE9E7" stroke="#C0392B" stroke-width="1.4"/>
    <text x="885" y="384" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f3a5f">utils/output_parser.py</text>
    <line x1="820" y1="394" x2="970" y2="394" stroke="#F0BAB1" stroke-width="0.8"/>
    <text x="885" y="410" font-size="9" text-anchor="middle" fill="#444">RobustOutputParser</text>
    <text x="885" y="424" font-size="9" text-anchor="middle" fill="#444">六级级联架构</text>
  </g>

  <!-- Arrows from Agent to each utility -->
  <path d="M 420 246 Q 320 280 130 360" fill="none" stroke="#2E5C8A" stroke-width="1.5" marker-end="url(#ar2)"/>
  <path d="M 460 246 Q 400 300 310 360" fill="none" stroke="#2E5C8A" stroke-width="1.5" marker-end="url(#ar2)"/>
  <line x1="500" y1="246" x2="505" y2="360" stroke="#2E5C8A" stroke-width="1.5" marker-end="url(#ar2)"/>
  <path d="M 540 246 Q 600 300 695 360" fill="none" stroke="#2E5C8A" stroke-width="1.5" marker-end="url(#ar2)"/>
  <path d="M 580 246 Q 680 280 870 360" fill="none" stroke="#2E5C8A" stroke-width="1.5" marker-end="url(#ar2)"/>

  <!-- Caption -->
  <rect x="100" y="460" width="800" height="56" rx="4" fill="#F8F9FA" stroke="#DDD"/>
  <text x="120" y="480" font-size="10" fill="#444" font-weight="bold">设计原则:</text>
  <text x="120" y="496" font-size="10" fill="#444">• 单一职责: 每个 utils 模块仅负责一个核心功能，便于独立测试与替换</text>
  <text x="120" y="508" font-size="10" fill="#444">• 松耦合: Agent 通过显式接口调用各模块，易于扩展（如未来新增 App 适配器）</text>

  <text x="500" y="510" font-size="10" text-anchor="middle" fill="#666" font-style="italic">图 2 · 高内聚、松耦合的模块依赖架构</text>
</svg>
