<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="Noto Sans CJK SC, Arial, Helvetica, sans-serif">
  <defs>
    <marker id="ar6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3D8B40"/>
    </marker>
  </defs>

  <text x="500" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">视觉自适应图像预处理流水线</text>
  <text x="500" y="48" font-size="11" text-anchor="middle" fill="#555">Vision-Adaptive Image Preprocessing Pipeline (LANCZOS Downscaling + RGB Normalization)</text>

  <!-- Stage 1: Input -->
  <rect x="40" y="100" width="170" height="180" rx="6" fill="#FBE9E7" stroke="#C0392B" stroke-width="1.4"/>
  <text x="125" y="124" font-size="12" font-weight="bold" text-anchor="middle" fill="#7A1F1F">阶段 1 · 原始输入</text>
  <!-- Phone screen mockup -->
  <rect x="80" y="140" width="90" height="120" rx="4" fill="#FFFFFF" stroke="#888" stroke-width="1"/>
  <rect x="83" y="143" width="84" height="6" fill="#E0E0E0"/>
  <rect x="86" y="152" width="78" height="14" rx="2" fill="#CCC"/>
  <rect x="86" y="170" width="78" height="14" rx="2" fill="#CCC"/>
  <rect x="86" y="188" width="78" height="14" rx="2" fill="#CCC"/>
  <text x="125" y="215" font-size="9" text-anchor="middle" fill="#555">Nubia Z80 Ultra</text>
  <text x="125" y="230" font-size="11" text-anchor="middle" fill="#7A1F1F" font-weight="bold">1080 × 2340 px</text>
  <text x="125" y="244" font-size="10" text-anchor="middle" fill="#7A1F1F">≈ 3,370 token</text>
  <text x="125" y="255" font-size="9" text-anchor="middle" fill="#7A1F1F" font-style="italic">RGBA, 任意 mode</text>

  <!-- Arrow 1 -->
  <line x1="218" y1="190" x2="248" y2="190" stroke="#3D8B40" stroke-width="2" marker-end="url(#ar6)"/>

  <!-- Stage 2: Decision -->
  <polygon points="305,140 380,190 305,240 230,190" fill="#FFF7E6" stroke="#D49A2E" stroke-width="1.4"/>
  <text x="305" y="180" font-size="11" font-weight="bold" text-anchor="middle" fill="#7A5300">条件判断</text>
  <text x="305" y="195" font-size="10" text-anchor="middle" fill="#7A5300">width &gt; 720?</text>
  <text x="305" y="210" font-size="9" text-anchor="middle" fill="#555" font-style="italic">(决策点)</text>

  <!-- Arrows from decision -->
  <line x1="380" y1="190" x2="408" y2="190" stroke="#3D8B40" stroke-width="2" marker-end="url(#ar6)"/>
  <text x="395" y="184" font-size="9" fill="#1F5223" font-weight="bold">是</text>

  <!-- Stage 3: LANCZOS resize -->
  <rect x="408" y="100" width="200" height="180" rx="6" fill="#EDF7EE" stroke="#3D8B40" stroke-width="1.4"/>
  <text x="508" y="124" font-size="12" font-weight="bold" text-anchor="middle" fill="#1F5223">阶段 2 · 降采样</text>
  <text x="508" y="142" font-size="10" text-anchor="middle" fill="#1F5223" font-style="italic">PIL.Image.LANCZOS</text>

  <text x="430" y="170" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#333">ratio = 720 / W</text>
  <text x="430" y="186" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#333">new_h = ⌊H · ratio⌋</text>
  <text x="430" y="202" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#333">img.resize(</text>
  <text x="430" y="216" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#333">  (720, new_h),</text>
  <text x="430" y="230" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#333">  Image.LANCZOS</text>
  <text x="430" y="244" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#333">)</text>

  <text x="508" y="266" font-size="9" text-anchor="middle" fill="#1F5223" font-style="italic">Sinc 函数近似，最高质量降采样</text>

  <!-- Arrow 2 -->
  <line x1="616" y1="190" x2="646" y2="190" stroke="#3D8B40" stroke-width="2" marker-end="url(#ar6)"/>

  <!-- Stage 4: RGB convert -->
  <rect x="646" y="100" width="170" height="180" rx="6" fill="#E8F1FA" stroke="#2E5C8A" stroke-width="1.4"/>
  <text x="731" y="124" font-size="12" font-weight="bold" text-anchor="middle" fill="#1f3a5f">阶段 3 · 模式归一化</text>
  <text x="731" y="146" font-size="10" text-anchor="middle" fill="#1f3a5f">mode != "RGB"?</text>
  <text x="731" y="172" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#333">img.convert("RGB")</text>
  <text x="731" y="194" font-size="9" text-anchor="middle" fill="#1f3a5f" font-style="italic">去除 Alpha 通道</text>
  <text x="731" y="210" font-size="9" text-anchor="middle" fill="#1f3a5f" font-style="italic">PNG → RGB 三通道</text>
  <line x1="690" y1="225" x2="772" y2="225" stroke="#B6CCE2" stroke-width="0.6"/>
  <text x="731" y="244" font-size="10" text-anchor="middle" fill="#1f3a5f" font-weight="bold">Base64 编码</text>
  <text x="731" y="260" font-size="9" text-anchor="middle" fill="#1f3a5f">→ data:image/png;base64,...</text>

  <!-- Arrow 3 -->
  <line x1="824" y1="190" x2="854" y2="190" stroke="#3D8B40" stroke-width="2" marker-end="url(#ar6)"/>

  <!-- Stage 5: Output -->
  <rect x="854" y="100" width="106" height="180" rx="6" fill="#D6F0DC" stroke="#3D8B40" stroke-width="1.6"/>
  <text x="907" y="124" font-size="11" font-weight="bold" text-anchor="middle" fill="#1F5223">阶段 4 · 输出</text>
  <rect x="875" y="140" width="64" height="100" rx="4" fill="#FFFFFF" stroke="#888"/>
  <rect x="877" y="143" width="60" height="5" fill="#E0E0E0"/>
  <rect x="879" y="151" width="56" height="11" rx="1" fill="#CCC"/>
  <rect x="879" y="164" width="56" height="11" rx="1" fill="#CCC"/>
  <rect x="879" y="177" width="56" height="11" rx="1" fill="#CCC"/>
  <text x="907" y="215" font-size="10" text-anchor="middle" fill="#1F5223" font-weight="bold">720 × 1560</text>
  <text x="907" y="230" font-size="10" text-anchor="middle" fill="#1F5223">≈ 1,498 tk</text>

  <!-- Bottom: Token saving stats -->
  <rect x="100" y="320" width="800" height="120" rx="6" fill="#F8F9FA" stroke="#DDD" stroke-width="1"/>
  <text x="500" y="342" font-size="12" font-weight="bold" text-anchor="middle" fill="#1f3a5f">▼ Token 消耗节省分析</text>

  <text x="160" y="370" font-size="11" fill="#444" font-weight="bold">原始 (3,370 tk)</text>
  <rect x="290" y="358" width="500" height="20" rx="3" fill="#FBE9E7" stroke="#C0392B"/>
  <text x="800" y="372" font-size="10" fill="#7A1F1F" font-weight="bold">100%</text>

  <text x="160" y="402" font-size="11" fill="#444" font-weight="bold">压缩后 (1,498 tk)</text>
  <rect x="290" y="390" width="222" height="20" rx="3" fill="#D6F0DC" stroke="#3D8B40"/>
  <text x="525" y="404" font-size="10" fill="#1F5223" font-weight="bold">≈ 44.5% (节省 55.5%)</text>

  <text x="500" y="430" font-size="10" text-anchor="middle" fill="#666" font-style="italic">
    根据 OpenAI vision token 计费模型: C ≈ ⌈(W × H) / 750⌉, 720 px 宽是文字可读性与压缩率的最佳折衷点
  </text>

  <text x="500" y="466" font-size="10" text-anchor="middle" fill="#666" font-style="italic">图 6 · 三阶段图像预处理流水线 — 在保留 UI 文字可读性的前提下降低 55% Token 开销</text>
</svg>
