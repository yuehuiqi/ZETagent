<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Noto Sans CJK SC, Arial, DejaVu Math TeX Gyre, Helvetica, sans-serif">
  <defs>
    <marker id="ar5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6F42C1"/>
    </marker>
  </defs>

  <text x="500" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">结构化双层提示工程架构</text>
  <text x="500" y="48" font-size="11" text-anchor="middle" fill="#555">Two-Layer Prompt Architecture: Static SYSTEM (KV-Cache friendly) + Dynamic USER</text>

  <!-- Left: SYSTEM PROMPT (static) -->
  <rect x="40" y="80" width="440" height="510" rx="8" fill="#F3EBF8" stroke="#6F42C1" stroke-width="1.6"/>
  <rect x="40" y="80" width="440" height="36" rx="8" fill="#6F42C1"/>
  <text x="260" y="103" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFF">SYSTEM Prompt (静态层)</text>
  <text x="260" y="132" font-size="10" text-anchor="middle" fill="#6F42C1" font-style="italic">每次请求保持一致 → 命中 KV-Cache，降低成本</text>

  <!-- Items inside system -->
  <rect x="60" y="148" width="400" height="60" rx="4" fill="#FFFFFF" stroke="#9B7CCB"/>
  <text x="75" y="166" font-size="11" font-weight="bold" fill="#3F2466">① 角色定义 (Role Definition)</text>
  <text x="75" y="183" font-size="9" fill="#444">"你是移动端 GUI Agent 专家，任务是分析屏幕</text>
  <text x="75" y="196" font-size="9" fill="#444">截图并输出精确的下一步操作"</text>

  <rect x="60" y="220" width="400" height="60" rx="4" fill="#FFFFFF" stroke="#9B7CCB"/>
  <text x="75" y="238" font-size="11" font-weight="bold" fill="#3F2466">② 坐标系规范 (Coordinate System)</text>
  <text x="75" y="255" font-size="9" fill="#444">归一化坐标空间 [0, 1000] × [0, 1000]</text>
  <text x="75" y="268" font-size="9" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#444">x_norm = [x_pixel / W · 1000]</text>

  <rect x="60" y="292" width="400" height="60" rx="4" fill="#FFFFFF" stroke="#9B7CCB"/>
  <text x="75" y="310" font-size="11" font-weight="bold" fill="#3F2466">③ 动作格式规范 (Action Schema)</text>
  <text x="75" y="327" font-size="9" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#444">CLICK:[[x,y]]   TYPE:['内容']</text>
  <text x="75" y="340" font-size="9" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#444">SCROLL:[[x1,y1],[x2,y2]]   OPEN:['App']   COMPLETE:[]</text>

  <rect x="60" y="364" width="400" height="100" rx="4" fill="#F8F0FF" stroke="#9B7CCB"/>
  <text x="75" y="382" font-size="11" font-weight="bold" fill="#3F2466">④ * 坐标先验规则 (Coordinate Prior) — 创新点</text>
  <text x="75" y="398" font-size="9" fill="#444">屏幕分区先验经验值 (基于 11 个测试用例统计):</text>
  <text x="75" y="412" font-size="9" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#444">• 顶部状态栏:   y ∈ [60, 140]</text>
  <text x="75" y="425" font-size="9" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#444">• 顶部右侧图标: x ∈ [880, 970], y ∈ [70, 120]</text>
  <text x="75" y="438" font-size="9" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#444">• 搜索结果第1条: y ∈ [140, 210]</text>
  <text x="75" y="451" font-size="9" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#444">• 底部标签栏:    y ∈ [880, 980]</text>

  <rect x="60" y="476" width="400" height="100" rx="4" fill="#FFFFFF" stroke="#9B7CCB"/>
  <text x="75" y="494" font-size="11" font-weight="bold" fill="#3F2466">⑤ 关键约束 (Hard Constraints)</text>
  <text x="75" y="510" font-size="9" fill="#444">1. 坐标必须为归一化整数</text>
  <text x="75" y="524" font-size="9" fill="#444">2. 「动作：」必须独立成行</text>
  <text x="75" y="538" font-size="9" fill="#444">3. 不得输出多余的解释或代码块</text>
  <text x="75" y="552" font-size="9" fill="#444">4. CLICK 命中元素中心 ± 30 px 容差</text>
  <text x="75" y="566" font-size="9" fill="#444">5. SCROLL 起止点同 x，方向用 y 差异</text>

  <!-- Right: USER PROMPT (dynamic) -->
  <rect x="520" y="80" width="440" height="510" rx="8" fill="#FFF7E6" stroke="#D49A2E" stroke-width="1.6"/>
  <rect x="520" y="80" width="440" height="36" rx="8" fill="#D49A2E"/>
  <text x="740" y="103" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFF">USER Prompt (动态层)</text>
  <text x="740" y="132" font-size="10" text-anchor="middle" fill="#7A5300" font-style="italic">每步根据上下文动态构造</text>

  <rect x="540" y="148" width="400" height="42" rx="4" fill="#FFFFFF" stroke="#E0B070"/>
  <text x="555" y="166" font-size="11" font-weight="bold" fill="#7A5300">① 用户任务描述</text>
  <text x="555" y="183" font-size="9" fill="#444">"帮我在美团订一份黄焖鸡外卖"  (来自 I)</text>

  <rect x="540" y="200" width="400" height="42" rx="4" fill="#FFFFFF" stroke="#E0B070"/>
  <text x="555" y="218" font-size="11" font-weight="bold" fill="#7A5300">② 当前步骤编号 + 全局计划 P</text>
  <text x="555" y="235" font-size="9" fill="#444">"当前为第 3/15 步, 计划: 步骤3 → 输入'黄焖鸡'..."</text>

  <rect x="540" y="252" width="400" height="42" rx="4" fill="#FFFFFF" stroke="#E0B070"/>
  <text x="555" y="270" font-size="11" font-weight="bold" fill="#7A5300">③ 历史摘要 (来自 ContextManager)</text>
  <text x="555" y="287" font-size="9" fill="#444">"已完成: Step1 OPEN美团, Step2 点外卖入口"</text>

  <rect x="540" y="304" width="400" height="42" rx="4" fill="#FFFFFF" stroke="#E0B070"/>
  <text x="555" y="322" font-size="11" font-weight="bold" fill="#7A5300">④ 最近 3 步操作详情</text>
  <text x="555" y="339" font-size="9" fill="#444">"最近: CLICK[[100,195]] → CLICK[[500,112]]"</text>

  <rect x="540" y="356" width="400" height="78" rx="4" fill="#FFFAEC" stroke="#E0B070"/>
  <text x="555" y="374" font-size="11" font-weight="bold" fill="#7A5300">⑤ * App 专属 Few-Shot 示例 — 创新点</text>
  <text x="555" y="390" font-size="9" fill="#444">"美团首页进入外卖 > CLICK:[[100, 195]]"</text>
  <text x="555" y="404" font-size="9" fill="#444">"外卖搜索框(空) > CLICK:[[500, 112]]"</text>
  <text x="555" y="418" font-size="9" fill="#7A5300" font-style="italic">→ 仅前 4 步注入，后续步骤跳过 (节省 token)</text>
  <text x="555" y="430" font-size="9" fill="#7A5300" font-style="italic">→ 9 类 App × 4-6 例 / 类 = 40+ 示例库</text>

  <rect x="540" y="444" width="400" height="42" rx="4" fill="#FFFFFF" stroke="#E0B070"/>
  <text x="555" y="462" font-size="11" font-weight="bold" fill="#7A5300">⑥ 输出格式强制约束</text>
  <text x="555" y="479" font-size="9" fill="#444">"请严格按格式输出，「动作：」独立成行..."</text>

  <rect x="540" y="496" width="400" height="42" rx="4" fill="#FCEDED" stroke="#C0392B" stroke-dasharray="3,2"/>
  <text x="555" y="514" font-size="11" font-weight="bold" fill="#7A1F1F">⑦ 重试错误提示 (仅重试时追加)</text>
  <text x="555" y="531" font-size="9" fill="#444">"! 上次输出格式错误 ([具体错误]), 请..."</text>

  <rect x="540" y="548" width="400" height="34" rx="4" fill="#E8F1FA" stroke="#2E5C8A"/>
  <text x="555" y="566" font-size="11" font-weight="bold" fill="#1f3a5f">⑧ 当前截图 S_t (Base64-encoded)</text>
  <text x="555" y="578" font-size="9" fill="#444">[image_url] data:image/png;base64,...</text>

  <text x="500" y="610" font-size="10" text-anchor="middle" fill="#666" font-style="italic">图 5 · SYSTEM 静态层 (复用 KV-Cache) + USER 动态层 (上下文感知)</text>
</svg>
