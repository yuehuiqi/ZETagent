<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="Noto Sans CJK SC, Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3D8B40"/>
    </marker>
    <marker id="arrDark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="500" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Token 感知动态上下文压缩机制</text>
  <text x="500" y="48" font-size="11" text-anchor="middle" fill="#555">Token-Aware Sliding-Window Context Compression</text>

  <!-- Step timeline -->
  <text x="50" y="90" font-size="12" font-weight="bold" fill="#333">历史步骤序列</text>
  <text x="50" y="106" font-size="10" fill="#666" font-style="italic">[Step 1, Step 2, ..., Step t-1] 当前为 Step t</text>

  <!-- Step blocks (history) -->
  <g>
    <rect x="50" y="125" width="60" height="60" rx="4" fill="#FFF3DE" stroke="#D49A2E" stroke-width="1.2"/>
    <text x="80" y="145" font-size="10" font-weight="bold" text-anchor="middle">Step 1</text>
    <text x="80" y="160" font-size="9" text-anchor="middle" fill="#666">截图</text>
    <text x="80" y="173" font-size="9" text-anchor="middle" fill="#666">+动作</text>
  </g>
  <g>
    <rect x="115" y="125" width="60" height="60" rx="4" fill="#FFF3DE" stroke="#D49A2E" stroke-width="1.2"/>
    <text x="145" y="145" font-size="10" font-weight="bold" text-anchor="middle">Step 2</text>
    <text x="145" y="160" font-size="9" text-anchor="middle" fill="#666">截图</text>
    <text x="145" y="173" font-size="9" text-anchor="middle" fill="#666">+动作</text>
  </g>
  <g>
    <rect x="180" y="125" width="60" height="60" rx="4" fill="#FFF3DE" stroke="#D49A2E" stroke-width="1.2"/>
    <text x="210" y="145" font-size="10" font-weight="bold" text-anchor="middle">…</text>
  </g>
  <g>
    <rect x="245" y="125" width="60" height="60" rx="4" fill="#FFF3DE" stroke="#D49A2E" stroke-width="1.2"/>
    <text x="275" y="145" font-size="10" font-weight="bold" text-anchor="middle">Step t-4</text>
    <text x="275" y="160" font-size="9" text-anchor="middle" fill="#666">截图</text>
    <text x="275" y="173" font-size="9" text-anchor="middle" fill="#666">+动作</text>
  </g>
  <!-- Recent N=3 (highlighted) -->
  <g>
    <rect x="320" y="125" width="60" height="60" rx="4" fill="#D6F0DC" stroke="#3D8B40" stroke-width="1.6"/>
    <text x="350" y="145" font-size="10" font-weight="bold" text-anchor="middle" fill="#1F5223">Step t-3</text>
    <text x="350" y="160" font-size="9" text-anchor="middle" fill="#1F5223">截图</text>
    <text x="350" y="173" font-size="9" text-anchor="middle" fill="#1F5223">+动作</text>
  </g>
  <g>
    <rect x="385" y="125" width="60" height="60" rx="4" fill="#D6F0DC" stroke="#3D8B40" stroke-width="1.6"/>
    <text x="415" y="145" font-size="10" font-weight="bold" text-anchor="middle" fill="#1F5223">Step t-2</text>
    <text x="415" y="160" font-size="9" text-anchor="middle" fill="#1F5223">截图</text>
    <text x="415" y="173" font-size="9" text-anchor="middle" fill="#1F5223">+动作</text>
  </g>
  <g>
    <rect x="450" y="125" width="60" height="60" rx="4" fill="#D6F0DC" stroke="#3D8B40" stroke-width="1.6"/>
    <text x="480" y="145" font-size="10" font-weight="bold" text-anchor="middle" fill="#1F5223">Step t-1</text>
    <text x="480" y="160" font-size="9" text-anchor="middle" fill="#1F5223">截图</text>
    <text x="480" y="173" font-size="9" text-anchor="middle" fill="#1F5223">+动作</text>
  </g>
  <!-- Sliding window indicator -->
  <rect x="316" y="121" width="200" height="68" rx="6" fill="none" stroke="#3D8B40" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="416" y="115" font-size="10" font-weight="bold" text-anchor="middle" fill="#1F5223">滑动窗口 N_win = 3</text>

  <!-- Current step -->
  <g>
    <rect x="540" y="125" width="60" height="60" rx="4" fill="#2E5C8A" stroke="#1f3a5f" stroke-width="1.6"/>
    <text x="570" y="145" font-size="10" font-weight="bold" text-anchor="middle" fill="#FFF">Step t</text>
    <text x="570" y="160" font-size="9" text-anchor="middle" fill="#FFF">当前</text>
    <text x="570" y="173" font-size="9" text-anchor="middle" fill="#FFF">需决策</text>
  </g>

  <!-- Brace: early -->
  <path d="M 50 195 Q 50 205 60 205 L 175 205 Q 185 205 185 215 Q 185 205 195 205 L 295 205 Q 305 205 305 195" fill="none" stroke="#7A5300" stroke-width="1.4"/>
  <text x="180" y="223" font-size="10" text-anchor="middle" fill="#7A5300" font-weight="bold">早期历史 → 文字摘要 (~30 token/步)</text>

  <path d="M 320 195 Q 320 205 330 205 L 410 205 Q 420 205 420 215 Q 420 205 430 205 L 505 205 Q 515 205 515 195" fill="none" stroke="#1F5223" stroke-width="1.4"/>
  <text x="416" y="223" font-size="10" text-anchor="middle" fill="#1F5223" font-weight="bold">近期历史 → 完整图像 (~1500 token/步)</text>

  <!-- Lower part: Storage tracks -->
  <line x1="50" y1="260" x2="950" y2="260" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3"/>

  <text x="500" y="285" font-size="13" font-weight="bold" text-anchor="middle" fill="#1f3a5f">▼ 双轨存储设计 (Dual-Track Storage)</text>

  <!-- Track 1: Text records -->
  <rect x="60" y="305" width="420" height="100" rx="6" fill="#FFF7E6" stroke="#D49A2E" stroke-width="1.4"/>
  <text x="80" y="328" font-size="12" font-weight="bold" fill="#7A5300">轨道 1: _step_records (全量文字)</text>
  <text x="80" y="344" font-size="10" fill="#555">数据结构: List[Dict] — 始终保留完整历史</text>
  <text x="80" y="360" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#444">{step:1, action:"OPEN", params:{...}, brief:"打开美团"}</text>
  <text x="80" y="376" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#444">{step:2, action:"CLICK", params:{...}, brief:"点外卖入口"}</text>
  <text x="80" y="392" font-size="10" fill="#7A5300" font-style="italic">↳ 用于历史摘要文字注入 user_prompt</text>

  <!-- Track 2: Image messages (sliding) -->
  <rect x="520" y="305" width="420" height="100" rx="6" fill="#EDF7EE" stroke="#3D8B40" stroke-width="1.4"/>
  <text x="540" y="328" font-size="12" font-weight="bold" fill="#1F5223">轨道 2: _image_messages (滑动窗口)</text>
  <text x="540" y="344" font-size="10" fill="#555">数据结构: deque(maxlen=2N_win=6) — 仅保最近</text>
  <text x="540" y="360" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#444">[user_msg_t-3, asst_msg_t-3,</text>
  <text x="540" y="376" font-size="10" font-family="Noto Sans Mono CJK SC, Consolas, monospace" fill="#444">  user_msg_t-2, ..., asst_msg_t-1]</text>
  <text x="540" y="392" font-size="10" fill="#1F5223" font-style="italic">↳ 直接拼接到 messages 列表传给 VLM</text>

  <!-- Token comparison bar chart -->
  <text x="500" y="438" font-size="12" font-weight="bold" text-anchor="middle" fill="#1f3a5f">▼ Token 消耗对比 (T = 15 步)</text>

  <!-- Full history bar -->
  <text x="120" y="463" font-size="10" fill="#444">全量携带</text>
  <rect x="200" y="450" width="600" height="22" rx="3" fill="#FBE9E7" stroke="#C0392B"/>
  <rect x="200" y="450" width="600" height="22" rx="3" fill="url(#bar1)"/>
  <text x="810" y="466" font-size="10" fill="#7A1F1F" font-weight="bold">≈ 25,500 token</text>

  <text x="120" y="497" font-size="10" fill="#444">本方案</text>
  <rect x="200" y="484" width="160" height="22" rx="3" fill="#D6F0DC" stroke="#3D8B40"/>
  <text x="370" y="500" font-size="10" fill="#1F5223" font-weight="bold">≈ 6,950 token  (节省 73%)</text>

  <text x="500" y="540" font-size="11" text-anchor="middle" fill="#1f3a5f" font-weight="bold">C_compressed ≈ N_win · C_img + T · C_text_summary  ≪  C_full ≈ T · (C_img + C_text)</text>

  <text x="500" y="566" font-size="10" text-anchor="middle" fill="#666" font-style="italic">图 4 · 双轨存储 + 滑动窗口压缩，使长任务 (45 步) Token 消耗仅占预算的 73%</text>
</svg>
