<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="Noto Sans CJK SC, Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="gBlue" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#5887C2"/>
      <stop offset="100%" stop-color="#2E5C8A"/>
    </linearGradient>
    <linearGradient id="gRed" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#E26B5A"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#5BB060"/>
      <stop offset="100%" stop-color="#3D8B40"/>
    </linearGradient>
  </defs>

  <text x="500" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">实验对比与消融分析</text>
  <text x="500" y="48" font-size="11" text-anchor="middle" fill="#555">Cumulative Improvement &amp; Ablation Study (11 Test Cases)</text>

  <!-- Top: Cumulative improvement chart -->
  <text x="500" y="78" font-size="13" font-weight="bold" text-anchor="middle" fill="#1f3a5f">(a) 模块累积叠加 — 任务完成率提升曲线</text>

  <!-- Axes -->
  <line x1="120" y1="320" x2="880" y2="320" stroke="#333" stroke-width="1.4"/>
  <line x1="120" y1="100" x2="120" y2="320" stroke="#333" stroke-width="1.4"/>

  <!-- Y-axis labels -->
  <text x="110" y="324" font-size="9" text-anchor="end" fill="#444">0%</text>
  <line x1="116" y1="320" x2="120" y2="320" stroke="#333"/>
  <text x="110" y="284" font-size="9" text-anchor="end" fill="#444">20%</text>
  <line x1="116" y1="280" x2="120" y2="280" stroke="#333"/>
  <line x1="120" y1="280" x2="880" y2="280" stroke="#EEE" stroke-dasharray="2,2"/>
  <text x="110" y="244" font-size="9" text-anchor="end" fill="#444">40%</text>
  <line x1="116" y1="240" x2="120" y2="240" stroke="#333"/>
  <line x1="120" y1="240" x2="880" y2="240" stroke="#EEE" stroke-dasharray="2,2"/>
  <text x="110" y="204" font-size="9" text-anchor="end" fill="#444">60%</text>
  <line x1="116" y1="200" x2="120" y2="200" stroke="#333"/>
  <line x1="120" y1="200" x2="880" y2="200" stroke="#EEE" stroke-dasharray="2,2"/>
  <text x="110" y="164" font-size="9" text-anchor="end" fill="#444">80%</text>
  <line x1="116" y1="160" x2="120" y2="160" stroke="#333"/>
  <line x1="120" y1="160" x2="880" y2="160" stroke="#EEE" stroke-dasharray="2,2"/>
  <text x="110" y="124" font-size="9" text-anchor="end" fill="#444">100%</text>
  <line x1="116" y1="120" x2="120" y2="120" stroke="#333"/>

  <text x="60" y="220" font-size="11" font-weight="bold" fill="#444" transform="rotate(-90 60 220)">任务完成率</text>

  <!-- Bars: 7 stages -->
  <!-- Bar 1: baseline 18% -->
  <rect x="155" y="284" width="76" height="36" fill="url(#gRed)" stroke="#7A1F1F"/>
  <text x="193" y="338" font-size="9" text-anchor="middle" fill="#444">baseline</text>
  <text x="193" y="350" font-size="9" text-anchor="middle" fill="#444">官方</text>
  <text x="193" y="278" font-size="10" text-anchor="middle" fill="#7A1F1F" font-weight="bold">18%</text>

  <!-- Bar 2: +img 27% -->
  <rect x="251" y="266" width="76" height="54" fill="url(#gBlue)" stroke="#1f3a5f"/>
  <text x="289" y="338" font-size="9" text-anchor="middle" fill="#444">+ 图像</text>
  <text x="289" y="350" font-size="9" text-anchor="middle" fill="#444">预处理</text>
  <text x="289" y="260" font-size="10" text-anchor="middle" fill="#1f3a5f" font-weight="bold">27%</text>

  <!-- Bar 3: +parser 36% -->
  <rect x="347" y="248" width="76" height="72" fill="url(#gBlue)" stroke="#1f3a5f"/>
  <text x="385" y="338" font-size="9" text-anchor="middle" fill="#444">+ 鲁棒</text>
  <text x="385" y="350" font-size="9" text-anchor="middle" fill="#444">解析</text>
  <text x="385" y="242" font-size="10" text-anchor="middle" fill="#1f3a5f" font-weight="bold">36%</text>

  <!-- Bar 4: +prompt 45% -->
  <rect x="443" y="230" width="76" height="90" fill="url(#gBlue)" stroke="#1f3a5f"/>
  <text x="481" y="338" font-size="9" text-anchor="middle" fill="#444">+ 结构化</text>
  <text x="481" y="350" font-size="9" text-anchor="middle" fill="#444">Prompt</text>
  <text x="481" y="224" font-size="10" text-anchor="middle" fill="#1f3a5f" font-weight="bold">45%</text>

  <!-- Bar 5: +context 55% -->
  <rect x="539" y="210" width="76" height="110" fill="url(#gBlue)" stroke="#1f3a5f"/>
  <text x="577" y="338" font-size="9" text-anchor="middle" fill="#444">+ Context</text>
  <text x="577" y="350" font-size="9" text-anchor="middle" fill="#444">Manager</text>
  <text x="577" y="204" font-size="10" text-anchor="middle" fill="#1f3a5f" font-weight="bold">55%</text>

  <!-- Bar 6: +planner 64% -->
  <rect x="635" y="192" width="76" height="128" fill="url(#gBlue)" stroke="#1f3a5f"/>
  <text x="673" y="338" font-size="9" text-anchor="middle" fill="#444">+ Task</text>
  <text x="673" y="350" font-size="9" text-anchor="middle" fill="#444">Planner</text>
  <text x="673" y="186" font-size="10" text-anchor="middle" fill="#1f3a5f" font-weight="bold">64%</text>

  <!-- Bar 7: full 73% -->
  <rect x="731" y="174" width="76" height="146" fill="url(#gGreen)" stroke="#1F5223"/>
  <text x="769" y="338" font-size="9" text-anchor="middle" fill="#1F5223" font-weight="bold">完整方案</text>
  <text x="769" y="350" font-size="9" text-anchor="middle" fill="#1F5223" font-weight="bold">(全部)</text>
  <text x="769" y="168" font-size="11" text-anchor="middle" fill="#1F5223" font-weight="bold">73%</text>

  <!-- Trendline overlay -->
  <polyline points="193,284 289,266 385,248 481,230 577,210 673,192 769,174" fill="none" stroke="#D49A2E" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="193" cy="284" r="3" fill="#D49A2E"/>
  <circle cx="289" cy="266" r="3" fill="#D49A2E"/>
  <circle cx="385" cy="248" r="3" fill="#D49A2E"/>
  <circle cx="481" cy="230" r="3" fill="#D49A2E"/>
  <circle cx="577" cy="210" r="3" fill="#D49A2E"/>
  <circle cx="673" cy="192" r="3" fill="#D49A2E"/>
  <circle cx="769" cy="174" r="3" fill="#D49A2E"/>

  <!-- Legend -->
  <rect x="820" y="100" width="14" height="14" fill="url(#gRed)"/>
  <text x="838" y="111" font-size="9" fill="#444">基线</text>
  <rect x="820" y="120" width="14" height="14" fill="url(#gBlue)"/>
  <text x="838" y="131" font-size="9" fill="#444">阶段叠加</text>
  <rect x="820" y="140" width="14" height="14" fill="url(#gGreen)"/>
  <text x="838" y="151" font-size="9" fill="#444">完整方案</text>

  <!-- Bottom: Ablation chart -->
  <text x="500" y="396" font-size="13" font-weight="bold" text-anchor="middle" fill="#1f3a5f">(b) 单点消融 — 各模块独立贡献度 (从完整方案中移除单一模块的损失)</text>

  <!-- Horizontal axis at y=620 -->
  <line x1="320" y1="620" x2="880" y2="620" stroke="#333" stroke-width="1.4"/>
  <line x1="320" y1="430" x2="320" y2="620" stroke="#333" stroke-width="1.4"/>
  <text x="320" y="635" font-size="9" text-anchor="middle" fill="#444">0</text>
  <text x="376" y="635" font-size="9" text-anchor="middle" fill="#444">-3%</text>
  <line x1="376" y1="620" x2="376" y2="616" stroke="#333"/>
  <line x1="376" y1="430" x2="376" y2="620" stroke="#EEE" stroke-dasharray="2,2"/>
  <text x="432" y="635" font-size="9" text-anchor="middle" fill="#444">-6%</text>
  <line x1="432" y1="620" x2="432" y2="616" stroke="#333"/>
  <line x1="432" y1="430" x2="432" y2="620" stroke="#EEE" stroke-dasharray="2,2"/>
  <text x="488" y="635" font-size="9" text-anchor="middle" fill="#444">-9%</text>
  <line x1="488" y1="620" x2="488" y2="616" stroke="#333"/>
  <line x1="488" y1="430" x2="488" y2="620" stroke="#EEE" stroke-dasharray="2,2"/>
  <text x="544" y="635" font-size="9" text-anchor="middle" fill="#444">-12%</text>
  <line x1="544" y1="620" x2="544" y2="616" stroke="#333"/>
  <line x1="544" y1="430" x2="544" y2="620" stroke="#EEE" stroke-dasharray="2,2"/>
  <text x="600" y="635" font-size="9" text-anchor="middle" fill="#444">-15%</text>
  <line x1="600" y1="620" x2="600" y2="616" stroke="#333"/>
  <line x1="600" y1="430" x2="600" y2="620" stroke="#EEE" stroke-dasharray="2,2"/>

  <text x="600" y="652" font-size="10" text-anchor="middle" fill="#444" font-weight="bold">任务完成率下降 (绝对百分点)</text>

  <!-- Bars (horizontal) - sorted by impact -->
  <!-- 移除坐标参考 -14.5% -->
  <text x="315" y="446" font-size="10" text-anchor="end" fill="#444">移除坐标参考规则</text>
  <rect x="320" y="436" width="270.7" height="16" fill="url(#gRed)" stroke="#7A1F1F"/>
  <text x="600" y="448" font-size="9" fill="#7A1F1F" font-weight="bold">  -14.5%</text>

  <!-- 移除鲁棒解析 -13.6% -->
  <text x="315" y="476" font-size="10" text-anchor="end" fill="#444">移除鲁棒解析器</text>
  <rect x="320" y="466" width="253.9" height="16" fill="url(#gRed)" stroke="#7A1F1F"/>
  <text x="582" y="478" font-size="9" fill="#7A1F1F" font-weight="bold">  -13.6%</text>

  <!-- 移除 TaskPlanner -12.7% -->
  <text x="315" y="506" font-size="10" text-anchor="end" fill="#444">移除 TaskPlanner</text>
  <rect x="320" y="496" width="237.0" height="16" fill="#E26B5A" stroke="#7A1F1F"/>
  <text x="565" y="508" font-size="9" fill="#7A1F1F" font-weight="bold">  -12.7%</text>

  <!-- 移除 ContextManager -10.9% -->
  <text x="315" y="536" font-size="10" text-anchor="end" fill="#444">移除 ContextManager</text>
  <rect x="320" y="526" width="203.4" height="16" fill="#E26B5A" stroke="#7A1F1F"/>
  <text x="531" y="538" font-size="9" fill="#7A1F1F" font-weight="bold">  -10.9%</text>

  <!-- 移除 FewShot -9.1% -->
  <text x="315" y="566" font-size="10" text-anchor="end" fill="#444">移除 App 专属 FewShot</text>
  <rect x="320" y="556" width="169.8" height="16" fill="#F0998A" stroke="#7A1F1F"/>
  <text x="497" y="568" font-size="9" fill="#7A1F1F" font-weight="bold">  -9.1%</text>

  <!-- 移除图像预处理 -6.4% -->
  <text x="315" y="596" font-size="10" text-anchor="end" fill="#444">移除图像预处理</text>
  <rect x="320" y="586" width="119.5" height="16" fill="#F0998A" stroke="#7A1F1F"/>
  <text x="447" y="598" font-size="9" fill="#7A1F1F" font-weight="bold">  -6.4%</text>

  <!-- 移除重试 -4.5% -->
  <text x="315" y="616" font-size="10" text-anchor="end" fill="#444">移除自适应重试</text>
  <rect x="320" y="606" width="84.0" height="14" fill="#F4B6AB" stroke="#7A1F1F"/>
  <text x="412" y="617" font-size="9" fill="#7A1F1F" font-weight="bold">  -4.5%</text>

  <!-- Side annotation -->
  <rect x="690" y="436" width="200" height="180" rx="4" fill="#F8F9FA" stroke="#888"/>
  <text x="790" y="456" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f3a5f">关键发现</text>
  <line x1="710" y1="466" x2="870" y2="466" stroke="#CCC"/>
  <text x="700" y="483" font-size="9" fill="#444">▸ <tspan font-weight="bold">坐标先验</tspan> 单点贡献最大</text>
  <text x="722" y="495" font-size="9" fill="#666">(GUI 任务的核心瓶颈)</text>
  <text x="700" y="516" font-size="9" fill="#444">▸ <tspan font-weight="bold">鲁棒解析</tspan> 防止格式失败</text>
  <text x="722" y="528" font-size="9" fill="#666">是从单点失败到全任务失败</text>
  <text x="722" y="540" font-size="9" fill="#666">的关键防线</text>
  <text x="700" y="561" font-size="9" fill="#444">▸ <tspan font-weight="bold">规划+上下文</tspan> 对长任务</text>
  <text x="722" y="573" font-size="9" fill="#666">(8+ 步) 增益尤为显著</text>
  <text x="700" y="594" font-size="9" fill="#444">▸ 各模块互补性强,</text>
  <text x="722" y="606" font-size="9" fill="#666">移除任一均损失明显</text>

  <text x="500" y="652" font-size="10" text-anchor="middle" fill="#666" font-style="italic" opacity="0">_</text>
</svg>
